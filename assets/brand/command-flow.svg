<svg width="1600" height="280" viewBox="0 0 1600 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0D1624"/>
      <stop offset="1" stop-color="#171A2E"/>
    </linearGradient>
    <linearGradient id="track" x1="210" y1="140" x2="1390" y2="140" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#A3E635"/>
      <stop offset="1" stop-color="#F6B73C"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1600" height="280" rx="28" fill="url(#bg)"/>
  <path d="M240 140H1360" stroke="#29405C" stroke-width="3" stroke-dasharray="8 12"/>
  <path d="M240 140H1360" stroke="url(#track)" stroke-width="3" stroke-dasharray="280 840">
    <animate attributeName="stroke-dashoffset" values="0;-1120" dur="5.4s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(160 74)">
    <rect width="250" height="132" rx="24" fill="#111F32" stroke="#355071"/>
    <circle cx="46" cy="44" r="12" fill="#7DD3FC"/>
    <text x="72" y="50" fill="#F8FBFF" font-family="Georgia, serif" font-size="30" font-weight="700">AUDIT</text>
    <text x="32" y="86" fill="#A4B5D1" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">Score the trust surface.</text>
    <text x="32" y="112" fill="#A4B5D1" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">Spot missing signals fast.</text>
  </g>

  <g transform="translate(675 54)">
    <rect width="250" height="172" rx="24" fill="#101F22" stroke="#2E6D68"/>
    <circle cx="46" cy="44" r="12" fill="#A3E635"/>
    <text x="72" y="50" fill="#F8FBFF" font-family="Georgia, serif" font-size="30" font-weight="700">FIX</text>
    <text x="32" y="86" fill="#B8CBB8" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">Scaffold docs, templates, CI,</text>
    <text x="32" y="112" fill="#B8CBB8" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">and contributor-facing hygiene.</text>
    <rect x="32" y="132" width="184" height="18" rx="9" fill="#1B332F"/>
    <rect x="32" y="132" width="0" height="18" rx="9" fill="#A3E635">
      <animate attributeName="width" values="0;184;184" dur="4.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(1190 74)">
    <rect width="250" height="132" rx="24" fill="#241A14" stroke="#7D5737"/>
    <circle cx="46" cy="44" r="12" fill="#F6B73C"/>
    <text x="72" y="50" fill="#F8FBFF" font-family="Georgia, serif" font-size="30" font-weight="700">RELEASE</text>
    <text x="32" y="86" fill="#D7BDA3" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">Publish a repo that feels</text>
    <text x="32" y="112" fill="#D7BDA3" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="18">launch-ready and repeatable.</text>
  </g>

  <circle cx="240" cy="140" r="8" fill="#7DD3FC"/>
  <circle cx="240" cy="140" r="18" fill="#7DD3FC" fill-opacity="0.32" filter="url(#glow)">
    <animate attributeName="cx" values="240;1360;1360" dur="5.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.85;1;0.85" dur="5.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="140" r="8" fill="#FDFDFD">
    <animate attributeName="cx" values="240;1360;1360" dur="5.4s" repeatCount="indefinite"/>
  </circle>
</svg>
