name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: ossify-x86_64-unknown-linux-gnu.tar.gz
            binary_name: ossify
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: ossify-x86_64-apple-darwin.tar.gz
            binary_name: ossify
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: ossify-x86_64-pc-windows-msvc.zip
            binary_name: ossify.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp README.md LICENSE dist/
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.archive_name }} -C dist .

      - name: Package release archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item README.md dist\README.md
          Copy-Item LICENSE dist\LICENSE
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist\${{ matrix.binary_name }}
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive_name }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive_name }}
          path: ${{ matrix.archive_name }}

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
          generate_release_notes: true
