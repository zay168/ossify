name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish, for example v0.2.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_name: ossify-x86_64-unknown-linux-gnu.tar.gz
            binary_name: ossify
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_name: ossify-x86_64-apple-darwin.tar.gz
            binary_name: ossify
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_name: ossify-x86_64-pc-windows-msvc.zip
            binary_name: ossify.exe

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package release archive (unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp README.md LICENSE dist/
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf ${{ matrix.archive_name }} -C dist .
          shasum -a 256 ${{ matrix.archive_name }} > ${{ matrix.archive_name }}.sha256

      - name: Package release archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item README.md dist\README.md
          Copy-Item LICENSE dist\LICENSE
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary_name }} dist\${{ matrix.binary_name }}
          Compress-Archive -Path dist\* -DestinationPath ${{ matrix.archive_name }}
          $hash = Get-FileHash -Algorithm SHA256 ${{ matrix.archive_name }}
          "{0}  {1}" -f $hash.Hash.ToLower(), (Split-Path -Leaf $hash.Path) | Set-Content "${{ matrix.archive_name }}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.archive_name }}
          path: |
            ${{ matrix.archive_name }}
            ${{ matrix.archive_name }}.sha256

  publish:
    name: publish-release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.sha256
          generate_release_notes: true
