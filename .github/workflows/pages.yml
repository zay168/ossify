name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend-demo/**"
      - "docs/install.ps1"
      - "docs/install.sh"
      - "docs/favicon.svg"
      - ".github/workflows/pages.yml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-demo/package-lock.json

      - name: Build React landing
        working-directory: frontend-demo
        run: |
          npm ci
          npm run build

      - name: Prepare Pages artifact
        run: |
          cp docs/install.ps1 frontend-demo/dist/install.ps1
          cp docs/install.sh frontend-demo/dist/install.sh
          cp docs/favicon.svg frontend-demo/dist/favicon.svg

      - uses: actions/upload-pages-artifact@v4
        with:
          path: frontend-demo/dist

      - id: deployment
        uses: actions/deploy-pages@v5
